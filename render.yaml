services:
  - type: web
    name: crisisloop-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CRISISLOOP_COACH_MODEL
        value: gpt-5.6-sol
      - key: CRISISLOOP_ENV
        value: production
      - key: CRISISLOOP_ALLOWED_ORIGINS
        sync: false
